# ============================================================
#  MikroUpdate — GitHub Actions Release Workflow
#  Tag push (v*) tetiklemesiyle otomatik build + release
# ============================================================

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write        # SignPath OIDC için gerekli
  actions: read           # SignPath artifact erişimi için gerekli

jobs:
  build-and-release:
    runs-on: windows-latest
    outputs:
      artifact-id: ${{ steps.upload-artifact.outputs.artifact-id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Verify .NET SDK
        run: dotnet --version

      - name: Restore dependencies
        run: dotnet restore MikroUpdate.slnx

      - name: Build solution
        run: dotnet build MikroUpdate.slnx -c Release --no-restore

      - name: Publish Win (framework-dependent)
        run: dotnet publish MikroUpdate.Win -c Release -o publish/win --no-self-contained

      - name: Publish Service (framework-dependent)
        run: dotnet publish MikroUpdate.Service -c Release -o publish/service --no-self-contained

      - name: Install Inno Setup 6
        run: choco install innosetup --yes --no-progress
        shell: pwsh

      - name: Compile Inno Setup installer
        run: |
          $isccPaths = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
          )
          $iscc = $isccPaths | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) { Write-Error "ISCC.exe bulunamadi!"; exit 1 }
          Write-Host "ISCC: $iscc"
          & $iscc Deployment\MikroUpdate.iss
        shell: pwsh

      - name: Extract version from tag
        id: version
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Extracted version: $version"
        shell: pwsh

      # SignPath imzalama için installer'ı artifact olarak yükle
      - name: Upload installer artifact
        id: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-unsigned
          path: installer/MikroUpdate_Setup_*.exe
          if-no-files-found: error

      - name: Create GitHub Release (unsigned)
        uses: softprops/action-gh-release@v2
        with:
          name: "MikroUpdate v${{ steps.version.outputs.VERSION }}"
          body: |
            ## MikroUpdate v${{ steps.version.outputs.VERSION }}

            ### Kurulum
            1. `.NET 10 Desktop Runtime` yüklü olmalıdır
            2. `MikroUpdate_Setup_${{ steps.version.outputs.VERSION }}.exe` dosyasını indirip çalıştırın
            3. Sessiz kurulum: `MikroUpdate_Setup_${{ steps.version.outputs.VERSION }}.exe /VERYSILENT /SUPPRESSMSGBOXES`

            Detaylar için [CHANGELOG.md](CHANGELOG.md) dosyasına bakın.
          files: |
            installer/MikroUpdate_Setup_*.exe
          draft: false
          prerelease: false
          generate_release_notes: true

  # ============================================================
  #  SignPath.io Code Signing (onay sonrası aktif olacak)
  # ============================================================
  sign-installer:
    needs: build-and-release
    runs-on: ubuntu-latest
    if: vars.SIGNPATH_SIGNING_ENABLED == 'true'

    steps:
      - name: Sign with SignPath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: MikroUpdate
          signing-policy-slug: release-signing
          artifact-configuration-slug: installer
          github-artifact-id: ${{ needs.build-and-release.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-installer

      - name: Upload signed installer to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: signed-installer/MikroUpdate_Setup_*.exe
